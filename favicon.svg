<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
  <!-- can body -->
  <path d="M19 19 V51 a13 4.6 0 0 0 26 0 V19" fill="#ffffff" stroke="#0f2a43" stroke-width="3"/>
  <!-- can lid -->
  <ellipse cx="32" cy="19" rx="13" ry="4.6" fill="#ffffff" stroke="#0f2a43" stroke-width="3"/>
  <!-- popped-open mouth -->
  <ellipse cx="32" cy="18.5" rx="5.6" ry="1.9" fill="#0f2a43"/>
  <!-- popped pull-tab ring, lifted and tilted -->
  <g transform="rotate(-20 32 11)">
    <rect x="27" y="1.5" width="10" height="15" rx="5" fill="#ffffff" stroke="#16A8C4" stroke-width="2.6"/>
    <rect x="29.6" y="5" width="4.8" height="8.4" rx="2.4" fill="none" stroke="#16A8C4" stroke-width="2"/>
    <circle cx="32" cy="15" r="1.4" fill="#0f2a43"/>
  </g>
  <!-- escaping fizz -->
  <circle cx="41" cy="11" r="1.7" stroke="#16A8C4" stroke-width="2"/>
  <circle cx="45" cy="6"  r="1.2" stroke="#16A8C4" stroke-width="2"/>
  <circle cx="38" cy="5"  r="1.3" stroke="#16A8C4" stroke-width="2"/>
</svg>
