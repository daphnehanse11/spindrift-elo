name: Update flavors

# Keeps flavors.js in sync with Spindrift's live sparkling-water collection.
# Runs weekly and on demand; commits only when something actually changed.

on:
  schedule:
    - cron: "0 12 * * 1" # Mondays at 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate flavors.js
        run: node scripts/update-flavors.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain flavors.js)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add flavors.js
            git commit -m "chore: sync flavors from Spindrift catalog"
            git push
          else
            echo "No flavor changes."
          fi
